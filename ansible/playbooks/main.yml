- name: Command setup for all nodes
  hosts: k8s_cluster
  become: true
  gather_facts: true
  roles:
    - role: common
    - role: containerd
    - role: k8s

- name: Initialize k8s master (control plane)
  hosts: master
  become: true
  gather_facts: true
  roles:
    - role: master

- name: Join worker nodes to the cluster
  hosts: workers
  become: true
  gather_facts: false
  roles:
    - role: workers

- name: Verify Cluster health
  hosts: master
  become: false
  gather_facts: false
  tasks:
    - name: Wait for all nodes to be ready
      command: kubectl get nodes --no-headers
      register: nodes_status
      until: >
        nodes_status.stdout_lines | length == 3 and
        nodes_status.stdout_lines | select('search', 'NotReady') | list | length == 0
      retries: 20
      delay: 15
      environment:
        KUBECONFIG: /home/vagrant/.kube/config

    - name: Print final node status
      debug:
        msg: "{{ nodes_status.stdout_lines }}"
    
    - name: Confirm all workers have joined
      assert:
        that:
          - "nodes_status.stdout | regex_search('k8s-worker-1\\s+Ready')"
          - "nodes_status.stdout | regex_search('k8s-worker-2\\s+Ready')"
          - nodes_status.stdout | regex_search('k8s-master\s+Ready')
        success_msg: "Cluster is healthy"
        fail_msg: "Cluster failed"