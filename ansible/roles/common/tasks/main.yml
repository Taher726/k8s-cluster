# 1. SYSTEM UPDATE
- name: Update apt cache
  apt:
    update_cache: yes

- name: Upgrade all packages
  apt:
    upgrade: yes

# 2. ADD CLUSTER HOSTS TO /etc/hosts
- name: Remove Vagrant loopback hostname entries
  lineinfile:
    path: "/etc/hosts"
    regexp: "^127\\.0\\..*\\s+{{ inventory_hostname }}$"
    state: absent

- name: Add cluster hosts to /etc/hosts
  become: true
  lineinfile:
    path: "/etc/hosts"
    line: "{{ item.ip }} {{ item.host }}"
    state: present
  loop: "{{ k8s_nodes }}"

# 3. DISABLE SWAP
- name: Disable swap
  command: swapoff -a

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

# 4. KERNEL MODULES & SYSCTL
- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl params for Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward,                 value: "1" }

# 5. INSTALL PACKAGES
- name: Install packages
  apt:
    name: "{{ packages }}"
    state: present