# 1. Install Java 11
- name: Install Java 11 runtime
  apt:
    name: openjdk-11-jre-headless
    state: present
    update_cache: true

# 2. Download Nexus package into /opt
- name: Ensure /opt exists
  file:
    path: /opt
    state: directory
    mode: "0755"

- name: Download Nexus package to /opt
  get_url:
    url: "{{ nexus_download_url }}"
    dest: "/opt/{{ nexus_package }}"
    mode: "0644"

# 3. Extract Nexus archive in /opt
- name: Extract Nexus archive in /opt
  unarchive:
    src: "/opt/{{ nexus_package }}"
    dest: /opt
    remote_src: true
    creates: "/opt/nexus-{{ nexus_version }}"

# 4. Move /opt/nexus-<version> to /opt/nexus
- name: Check if /opt/nexus exists
  stat:
    path: /opt/nexus
  register: nexus_dir

- name: Move extracted Nexus directory to /opt/nexus
  command: mv "/opt/nexus-{{ nexus_version }}" /opt/nexus
  when: not nexus_dir.stat.exists

# 5. Create nexus user
- name: Ensure nexus group exists
  group:
    name: "{{ nexus_group }}"
    state: present

- name: Ensure nexus user exists
  user:
    name: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    create_home: true
    shell: /bin/bash
    state: present

# 6. Set ownership for nexus and sonatype-work
- name: Ensure sonatype-work directory exists
  file:
    path: "{{ nexus_working_dir }}"
    state: directory
    mode: "0755"

- name: Set ownership on /opt/nexus
  file:
    path: /opt/nexus
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    recurse: true

- name: Set ownership on sonatype-work
  file:
    path: "{{ nexus_working_dir }}"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    recurse: true

# 7. Set run_as_user in nexus.rc
- name: Configure Nexus run user
  lineinfile:
    path: /opt/nexus/bin/nexus.rc
    regexp: '^#?run_as_user=.*'
    line: 'run_as_user="{{ nexus_user }}"'

# 8. Set Xms/Xmx in nexus.vmoptions
- name: Set Nexus minimum heap size
  lineinfile:
    path: /opt/nexus/bin/nexus.vmoptions
    regexp: '^-Xms'
    line: '-Xms768m'

- name: Set Nexus maximum heap size
  lineinfile:
    path: /opt/nexus/bin/nexus.vmoptions
    regexp: '^-Xmx'
    line: '-Xmx768m'

# 9. Remove endorsed dirs option
- name: Remove deprecated endorsed dirs option
  lineinfile:
    path: /opt/nexus/bin/nexus.vmoptions
    regexp: '^-Djava\.endorsed\.dirs=lib/endorsed'
    state: absent

- name: Set Nexus data path to sonatype-work
  lineinfile:
    path: /opt/nexus/bin/nexus.vmoptions
    regexp: '^-Dkaraf\.data='
    line: '-Dkaraf.data=/opt/sonatype-work/nexus3'

# 10. Start Nexus using shell command
- name: Start Nexus
  command: sh /opt/nexus/bin/nexus start
  become_user: "{{ nexus_user }}"
  args:
    creates: /opt/sonatype-work/nexus3/nexus.pid

- name: Wait for Nexus HTTP port
  wait_for:
    host: "127.0.0.1"
    port: "{{ nexus_port }}"
    delay: 10
    timeout: 300
    state: started

# 11. Read generate admin password
- name: Check if default admin password file exists
  stat:
    path: /opt/sonatype-work/nexus3/admin.password
  register: nexus_password_file

- name: Read Nexus default admin password
  slurp:
    src: "{{ nexus_working_dir }}/nexus3/admin.password"
  register: nexus_default_password_b64
  when: nexus_password_file.stat.exists

- name: Decode default password
  set_fact:
    nexus_default_password: "{{ nexus_default_password_b64.content | b64decode | trim }}"
  when: nexus_password_file.stat.exists

# 12. Change Nexus admin password via API
- name: Change Nexus admin password via API
  uri:
    url: "http://192.168.56.33:{{ nexus_port }}/service/rest/v1/security/users/admin/change-password"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_default_password }}"
    force_basic_auth: yes
    headers:
      Content-Type: "text/plain"
    body: "{{ nexus_admin_password }}"
    status_code: [200, 204]
  no_log: true
  when: nexus_password_file.stat.exists

# 13. Enable Docker Bearer Token Realm (It generates a temporary access toekns for docker clients instead of username/password)
- name: Enable Docker Bearer Tokean Realm
  uri:
    url: "http://192.168.56.33:{{ nexus_port }}/service/rest/v1/security/realms/active"
    method: PUT
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      - "NexusAuthenticatingRealm"
      - "DockerToken"
    status_code: [200, 204]

# 14. Create Docker hosted repository (It a private and self-hosted repo, it's used to store images)
- name: Create Docker hosted repository
  uri:
    url: "http://192.168.56.33:{{ nexus_port }}/service/rest/v1/repositories/docker/hosted"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ nexus_repo_name }}"
      online: true
      storage:
        blobStoreName: "default"
        strictContentTypeValidation: true
        writePolicy: "ALLOW"
      docker:
        v1Enabled: true
        forceBasicAuth: false
        httpPort: "{{ nexus_docker_port | int }}"
    status_code: [201, 400]
  register: repo_creation

- name: Docker repository status
  debug:
    msg: "{{ 'Repository already exists' if repo_creation.status == 400 else 'Repository created successfully' }}"

# 15. Configure docker insecure registry on vm-tools
- name: Configure Docker daemon for insecure registry
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: restart docker