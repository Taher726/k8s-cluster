# 1. DISABLE SWAP
- name: Disable swap
  command: swapoff -a

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

# 2. KERNEL MODULES & SYSCTL
- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl params for Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward,                 value: "1" }

# 3. INSTALL PACKAGES
- name: Install packages
  apt:
    name: "{{ packages }}"
    state: present

# 4. CREATE KEYRINGS DIRECTORY
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: vagrant
    group: vagrant
    mode: "0755"

# 5. INSTALL containerd
- name: Install containerd
  apt:
    name: containerd
    state: present
    update_cache: true

# 6. CREATE CONFIG DIRECTORY
- name: Create /etc/containerd directory
  file:
    path: /etc/containerd
    state: directory
    owner: vagrant
    group: vagrant
    mode: "0755"

# 7. GENERATE containerd DEFAULT CONFIG
- name: Generate containerd default config
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  notify: Restart containerd

# 8. ENABLE containerd TO USE SYSTEMD CGROUP
- name: Enable containerd to use systemd cgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

# 9. ENABLE AND START containerd
- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: true
    state: restarted