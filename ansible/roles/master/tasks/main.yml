# 1. INITIALIZE K8S CLUSTER
- name: Initialize k8s cluster
  command: >
    kubeadm init
    --apiserver-advertise-address={{ ip_master }}
    --pod-network-cidr={{ pod_network_cidr }}
  args:
    creates: /etc/kubernetes/admin.conf

# 2. CONFIGURATION VAGRANT USER
- name: Create .kube directory for vagrant user
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant

- name: Copy admin.conf to vagrant user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant

# 3. INSTALL FLANNEL CNI
- name: Download Flannel manifest
  get_url:
    url: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
    dest: /tmp/kube-flannel.yml
    mode: '0644'

- name: Patch Flannel to use correct network interface
  replace:
    path: /tmp/kube-flannel.yml
    regexp: '(\s+- --kube-subnet-mgr)'
    replace: '\1\n        - --iface={{ node_interface }}'

- name: Verify interface patch applied correctly
  shell: "grep 'iface={{ node_interface }}' /tmp/kube-flannel.yml"
  register: patch_check
  failed_when: patch_check.rc != 0
  changed_when: false

- name: Apply Flannel CNI
  command: kubectl apply -f /tmp/kube-flannel.yml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config

# 5. GENERATE JOIN COMMAND
- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command

- name: Save join command to a file
  copy:
    content: "{{ join_command.stdout }}"
    dest: /tmp/join_command.sh
    mode: "0755"

- name: Fetch join command to control machine
  fetch:
    src: /tmp/join_command.sh
    dest: /tmp/join_command.sh
    flat: true